<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 SB Quantization Comparison Tool</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f1f5f9;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { color: var(--primary); margin: 0; }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.875rem; color: #94a3b8; font-weight: 600; }
        select, input, button {
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .model-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            position: relative;
        }
        .model-card h3 { margin: 0; color: var(--primary); }
        .canvas-container {
            position: relative;
            width: 384px;
            height: 384px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        .stats-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            padding: 0.5rem 1rem;
            font-family: monospace;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }
        #log {
            margin-top: 2rem;
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.875rem;
            color: #10b981;
            max-height: 150px;
            overflow-y: auto;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: bold;
        }
        .badge-loading { background: var(--warning); color: black; }
        .badge-ready { background: var(--success); color: white; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Visual Quantization Comparison</h1>
            <div id="globalStatus" class="status-badge badge-loading">Initializing ORT...</div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>FP32 Drift (.onnx)</label>
                <input type="file" id="file_fp32_drift" accept=".onnx">
            </div>
            <div class="control-group">
                <label>FP32 Generator (.onnx)</label>
                <input type="file" id="file_fp32_gen" accept=".onnx">
            </div>
            <div class="control-group">
                <label>INT8 Drift (.onnx)</label>
                <input type="file" id="file_int8_drift" accept=".onnx">
            </div>
            <div class="control-group">
                <label>INT8 Generator (.onnx)</label>
                <input type="file" id="file_int8_gen" accept=".onnx">
            </div>
            <div class="control-group" style="justify-content: flex-end; grid-column: 1 / -1;">
                <button id="loadModelsBtn" style="background: var(--warning); color: black; width: 100%;">📁 Load Models from Files</button>
            </div>
            <div class="control-group" style="grid-column: 1 / -1; display: flex; gap: 10px;">
                <button onclick="downloadModel('fp32_drift')" style="flex: 1; background: #475569;">💾 Save FP32 Drift</button>
                <button onclick="downloadModel('fp32_gen')" style="flex: 1; background: #475569;">💾 Save FP32 Gen</button>
                <button onclick="downloadModel('int8_drift')" style="flex: 1; background: var(--success);">💾 Save INT8 Drift</button>
                <button onclick="downloadModel('int8_gen')" style="flex: 1; background: var(--success);">💾 Save INT8 Gen</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Category</label>
                <select id="labelSelect">
                    <option value="0">Airplane</option>
                    <option value="1">Bird</option>
                    <option value="2">Car</option>
                    <option value="3">Cat</option>
                    <option value="4">Deer</option>
                    <option value="5">Dog</option>
                    <option value="6">Horse</option>
                    <option value="7">Monkey</option>
                    <option value="8">Ship</option>
                    <option value="9">Truck</option>
                </select>
            </div>
            <div class="control-group">
                <label>Steps</label>
                <input type="number" id="stepsInput" value="30" min="5" max="100">
            </div>
            <div class="control-group">
                <label>Noise Seed</label>
                <input type="number" id="seedInput" value="42">
            </div>
            <div class="control-group" style="justify-content: flex-end;">
                <button id="compareBtn">🚀 Generate & Compare</button>
            </div>
        </div>

        <div class="comparison-grid">
            <!-- FP32 Reference -->
            <div class="model-card">
                <h3>FP32 (Original)</h3>
                <div class="canvas-container">
                    <canvas id="canvasFP32" width="96" height="96"></canvas>
                    <div class="stats-overlay">
                        <span id="timeFP32">0ms</span>
                        <span id="psnrFP32">Ref</span>
                    </div>
                </div>
                <div style="font-size: 0.875rem; color: #94a3b8;">High precision, slow inference.</div>
            </div>

            <!-- INT8 Quantized -->
            <div class="model-card">
                <h3>INT8 (Quantized)</h3>
                <div class="canvas-container">
                    <canvas id="canvasINT8" width="96" height="96"></canvas>
                    <div class="stats-overlay">
                        <span id="timeINT8">0ms</span>
                        <span id="diffINT8">Diff: 0%</span>
                    </div>
                </div>
                <div style="font-size: 0.875rem; color: #94a3b8;">Faster "Turbo" mode, slight loss.</div>
            </div>
        </div>

        <div id="log">Console ready...</div>
    </div>

    <script>
        const IMG_SIZE = 96;
        const LATENT_SHAPE = [1, 8, 12, 12];
        
        let sessions = {
            fp32_drift: null,
            fp32_gen: null,
            int8_drift: null,
            int8_gen: null
        };

        let modelBuffers = {
            fp32_drift: null,
            fp32_gen: null,
            int8_drift: null,
            int8_gen: null
        };

        const logEl = document.getElementById('log');
        function log(msg, type = 'info') {
            const colors = { info: '#10b981', error: '#ef4444', warn: '#eab308' };
            logEl.innerHTML += `<div style="color: ${colors[type]}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function loadModelFromFile(file) {
            if (!file) return null;
            const buffer = await file.arrayBuffer();
            const session = await ort.InferenceSession.create(buffer);
            return { session, buffer };
        }

        function downloadModel(key) {
            const buffer = modelBuffers[key];
            if (!buffer) {
                log(`No model data for ${key} to save.`, 'warn');
                return;
            }
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${key}.onnx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            log(`Downloaded ${key}.onnx`);
        }

        document.getElementById('loadModelsBtn').addEventListener('click', async () => {
            const status = document.getElementById('globalStatus');
            const btn = document.getElementById('loadModelsBtn');
            btn.disabled = true;
            status.className = 'status-badge badge-loading';
            status.textContent = 'Loading...';

            try {
                const files = {
                    fp32_drift: document.getElementById('file_fp32_drift').files[0],
                    fp32_gen: document.getElementById('file_fp32_gen').files[0],
                    int8_drift: document.getElementById('file_int8_drift').files[0],
                    int8_gen: document.getElementById('file_int8_gen').files[0]
                };

                let loadedCount = 0;
                for (const [key, file] of Object.entries(files)) {
                    if (file) {
                        log(`Loading ${key}: ${file.name}...`);
                        const { session, buffer } = await loadModelFromFile(file);
                        sessions[key] = session;
                        modelBuffers[key] = buffer;
                        log(`${key} loaded successfully.`);
                        loadedCount++;
                    }
                }

                if (loadedCount > 0) {
                    status.className = 'status-badge badge-ready';
                    status.textContent = 'Models Updated';
                } else {
                    log("No files selected.", 'warn');
                    status.className = 'status-badge badge-ready';
                    status.textContent = 'Models Ready (Existing)';
                }
            } catch (e) {
                log(`Error loading models: ${e.message}`, 'error');
                status.className = 'status-badge badge-error';
                status.textContent = 'Load Error';
            } finally {
                btn.disabled = false;
            }
        });

        async function initModels() {
            const status = document.getElementById('globalStatus');
            try {
                log("Loading default FP32 models...");
                const loadDefault = async (key, path) => {
                    try {
                        const response = await fetch(path);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const buffer = await response.arrayBuffer();
                        sessions[key] = await ort.InferenceSession.create(buffer);
                        modelBuffers[key] = buffer;
                        log(`Default ${key} loaded.`);
                    } catch (e) {
                        log(`Could not load default ${key}: ${e.message}`, 'warn');
                    }
                };

                await loadDefault('fp32_drift', './enhanced_label_sb/onnx/drift.onnx');
                await loadDefault('fp32_gen', './enhanced_label_sb/onnx/generator.onnx');
                await loadDefault('int8_drift', './enhanced_label_sb/onnx/drift_int8.onnx');
                await loadDefault('int8_gen', './enhanced_label_sb/onnx/generator_int8.onnx');

                status.className = 'status-badge badge-ready';
                status.textContent = 'Models Ready';
            } catch (e) {
                log(`Initialization failed: ${e.message}`, 'error');
                status.className = 'status-badge badge-error';
                status.textContent = 'Error Loading Models';
            }
        }

        // Deterministic Random for seed
        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function normalRandom(seed) {
            let u = 0, v = 0;
            while (u === 0) u = seededRandom(seed++);
            while (v === 0) v = seededRandom(seed++);
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        async function runBridge(driftSess, genSess, label, steps, seed, canvasId, timeId) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const start = performance.now();
            
            const latentSize = LATENT_SHAPE.reduce((a, b) => a * b, 1);
            const z0Data = new Float32Array(latentSize);
            let localSeed = seed;
            // Reduce initial scale (0.6) to prevent immediate saturation
            for (let i = 0; i < latentSize; i++) z0Data[i] = normalRandom(localSeed++) * 0.6;

            let z = new ort.Tensor('float32', z0Data, LATENT_SHAPE);
            const labelTensor = new ort.Tensor('int64', BigInt64Array.from([BigInt(label)]), [1]);
            const dt = 1.0 / steps;

            for (let i = 0; i < steps; i++) {
                const t = new ort.Tensor('float32', new Float32Array([i * dt]), [1, 1]);
                const results = await driftSess.run({ z, t, label: labelTensor });
                const drift = results.drift;
                
                const nextZData = new Float32Array(z.data.length);
                for (let j = 0; j < z.data.length; j++) {
                    // Strict Safety Clamp to prevent Tanh saturation (White Image)
                    nextZData[j] = Math.min(5.0, Math.max(-5.0, z.data[j] + drift.data[j] * dt));
                }
                z = new ort.Tensor('float32', nextZData, LATENT_SHAPE);
            }

            const genResults = await genSess.run({ z, label: labelTensor });
            renderToCanvas(genResults.reconstruction.data, ctx);
            
            const end = performance.now();
            document.getElementById(timeId).textContent = `${(end - start).toFixed(0)}ms`;
            return genResults.reconstruction.data;
        }

        function renderToCanvas(data, ctx) {
            const imgData = ctx.createImageData(IMG_SIZE, IMG_SIZE);
            const planeSize = IMG_SIZE * IMG_SIZE;
            for (let i = 0; i < planeSize; i++) {
                imgData.data[i*4 + 0] = Math.min(255, Math.max(0, (data[0*planeSize + i] + 1) / 2 * 255));
                imgData.data[i*4 + 1] = Math.min(255, Math.max(0, (data[1*planeSize + i] + 1) / 2 * 255));
                imgData.data[i*4 + 2] = Math.min(255, Math.max(0, (data[2*planeSize + i] + 1) / 2 * 255));
                imgData.data[i*4 + 3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function calculateDiff(data1, data2) {
            let sum = 0;
            for(let i=0; i<data1.length; i++) sum += Math.abs(data1[i] - data2[i]);
            return (sum / data1.length * 100).toFixed(2);
        }

        document.getElementById('compareBtn').addEventListener('click', async () => {
            const btn = document.getElementById('compareBtn');
            btn.disabled = true;
            btn.textContent = '✨ Generating...';
            
            const label = parseInt(document.getElementById('labelSelect').value);
            const steps = parseInt(document.getElementById('stepsInput').value);
            const seed = parseInt(document.getElementById('seedInput').value);

            try {
                if (!sessions.fp32_drift || !sessions.fp32_gen) {
                    throw new Error("FP32 models must be loaded.");
                }
                log(`Starting FP32 Reference generation (Seed: ${seed})...`);
                const fp32Data = await runBridge(sessions.fp32_drift, sessions.fp32_gen, label, steps, seed, 'canvasFP32', 'timeFP32');
                
                if (sessions.int8_drift && sessions.int8_gen) {
                    log("Starting INT8 Quantized generation...");
                    const int8Data = await runBridge(sessions.int8_drift, sessions.int8_gen, label, steps, seed, 'canvasINT8', 'timeINT8');
                    const diff = calculateDiff(fp32Data, int8Data);
                    document.getElementById('diffINT8').textContent = `Diff: ${diff}%`;
                    log(`Comparison complete. Visual difference: ${diff}%`);
                } else {
                    log("INT8 models not available for comparison.", 'warn');
                }
            } catch (e) {
                log(`Error: ${e.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate & Compare';
            }
        });

        initModels();
    </script>
</body>
</html>
